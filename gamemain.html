<!DOCTYPE html>

<html>
    <head>
        <title>Game Main Menu</title>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                font-family: Arial, sans-serif;
                background: #111;
                color: white;
            }

            canvas {
                position: fixed;
                top: 0;
                left: 0;
                z-index: 0;
            }

            .menu {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 1;
                text-align: center;
            }

            h1 {
                margin-bottom: 40px;
                font-size: 48px;
            }

            button {
                display: block;
                width: 200px;
                margin: 10px auto;
                padding: 15px;
                font-size: 18px;
                border: none;
                border-radius: 10px;
                cursor: pointer;
                transition: 0.3s;
            }

            .play {
                background: #4CAF50;
                color: white;
            }

            .quit {
                background: #f44336;
                color: white;
            }

            button:hover {
                transform: scale(1.1);
                opacity: 0.9;
            }
        </style>
    </head>
    <body>

        <canvas id="bg"></canvas>

        <div class="menu">
        <h1>Click-A-Dot</h1>
        <button class="play" onclick="startGame()">Play</button>
        <button class="quit" onclick="quitGame()">Quit</button>
        </div>

    <script>
        const canvas = document.getElementById("bg");
        const ctx = canvas.getContext("2d");

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        class Circle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 20 + 5;
                this.dx = (Math.random() - 0.5) * 1.5;
                this.dy = (Math.random() - 0.5) * 1.5;
                this.color = `hsl(${Math.random()*360}, 70%, 60%)`;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                this.x += this.dx;
                this.y += this.dy;

                if (this.x < 0 || this.x > canvas.width) this.dx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.dy *= -1;

                this.draw();
            }
        }

        const circles = [];
        for (let i = 0; i < 60; i++) {
            circles.push(new Circle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            circles.forEach(c => c.update());
            requestAnimationFrame(animate);
        }

        animate();

        function startGame() {
            window.location.href="./gamemaindiff.html"
        }

        function quitGame() {
            window.location.href="./project_index.html"
        }
    </script>

    </body>
</html>
